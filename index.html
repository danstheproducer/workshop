<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="workshop">
<meta name="theme-color" content="#f5f5f4">
<title>workshop</title>
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f5f4;
    --ink: #0c0a09;
    --ink-soft: #57534e;
    --ink-faint: #a8a29e;
    --line: rgba(12, 10, 9, 0.14);
  }
  body.dark {
    --bg: #0c0a09;
    --ink: #f5f5f4;
    --ink-soft: #a8a29e;
    --ink-faint: #57534e;
    --line: rgba(245, 245, 244, 0.16);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 14px;
    line-height: 1.55;
    min-height: 100vh;
    min-height: 100dvh;
    transition: background 0.2s ease, color 0.2s ease;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .wrapper {
    max-width: 720px;
    margin: 0 auto;
    padding: max(2.5rem, env(safe-area-inset-top) + 2rem) 1.5rem max(2.5rem, env(safe-area-inset-bottom) + 1.5rem);
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    gap: 1.75rem;
  }

  /* — Top bar — */
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  .brand { display: flex; align-items: center; gap: 0.7rem; min-width: 0; }
  .brand-sep { color: var(--ink-faint); }
  .dark-toggle {
    background: transparent;
    border: 1px solid var(--line);
    color: var(--ink);
    width: 30px;
    height: 30px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.15s ease, color 0.15s ease, background 0.15s ease;
    flex-shrink: 0;
  }
  .dark-toggle:hover { border-color: var(--ink); background: var(--ink); color: var(--bg); }

  hr {
    border: none;
    border-top: 1px solid var(--line);
  }

  /* — Intro — */
  .intro h1 {
    font-family: inherit;
    font-weight: 700;
    font-size: clamp(2rem, 6vw, 2.75rem);
    letter-spacing: -0.02em;
    line-height: 1;
  }

  /* — Section block — */
  .section-label {
    font-size: 0.65rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 0.65rem;
  }

  /* — Project list (app-card rows) — */
  .projects {
    display: flex;
    flex-direction: column;
  }
  .row {
    display: grid;
    grid-template-columns: auto minmax(0, 1fr) auto;
    align-items: center;
    gap: 1.1rem;
    padding: 0.95rem 0.65rem;
    border-top: 1px solid var(--line);
    color: inherit;
    text-decoration: none;
    transition: background 0.15s ease;
  }
  .row:last-child { border-bottom: 1px solid var(--line); }
  a.row:hover { background: rgba(12, 10, 9, 0.035); }
  body.dark a.row:hover { background: rgba(245, 245, 244, 0.05); }

  .row-icon {
    width: 52px;
    height: 52px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .row-icon svg, .row-icon img { width: 100%; height: 100%; display: block; }
  .row-icon-empty {
    border: 1px dashed var(--line);
    color: var(--ink-faint);
    font-size: 0.8rem;
    letter-spacing: 0.12em;
  }

  .row-content {
    display: flex;
    flex-direction: column;
    gap: 0.2rem;
    min-width: 0;
  }
  .row-name {
    font-weight: 500;
    font-size: 1.05rem;
    letter-spacing: -0.01em;
    line-height: 1.2;
  }
  .row-meta {
    font-size: 0.76rem;
    color: var(--ink-soft);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .row-arrow {
    color: var(--ink-faint);
    font-size: 1.05rem;
    transition: color 0.15s ease, transform 0.15s ease;
  }
  a.row:hover .row-arrow {
    color: var(--ink);
    transform: translateX(3px);
  }

  .row-placeholder { opacity: 0.55; pointer-events: none; }
  .row-placeholder .row-name { color: var(--ink-faint); }

  @media (max-width: 480px) {
    .row { gap: 0.9rem; padding: 0.85rem 0.5rem; }
    .row-icon { width: 44px; height: 44px; }
    .row-name { font-size: 0.98rem; }
    .row-meta { font-size: 0.7rem; }
  }

  /* — Footer — */
  footer {
    margin-top: auto;
    font-size: 0.62rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-faint);
    text-align: center;
    padding-top: 1.5rem;
  }

  /* Narrow phones: tighten the topbar and let it wrap gracefully */
  @media (max-width: 420px) {
    .topbar { font-size: 0.66rem; letter-spacing: 0.14em; }
    .brand { gap: 0.5rem; }
  }

  /* — Pull-to-refresh (for Home Screen / standalone app) — */
  .ptr {
    position: fixed;
    top: 0;
    left: 50%;
    margin-left: -18px;
    z-index: 9999;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    background: var(--bg);
    border: 1px solid var(--line);
    box-shadow: 0 4px 14px rgba(12, 10, 9, 0.14);
    opacity: 0;
    transform: translateY(-60px);
    pointer-events: none;
  }
  body.dark .ptr { box-shadow: 0 4px 14px rgba(0, 0, 0, 0.4); }
  .ptr.animate { transition: transform 0.25s ease, opacity 0.25s ease; }
  .ptr-arrow {
    width: 16px;
    height: 16px;
    color: var(--ink-soft);
    transition: transform 0.2s ease, color 0.2s ease;
  }
  .ptr.ready .ptr-arrow { transform: rotate(180deg); color: var(--ink); }
  .ptr.spin .ptr-arrow { animation: ptr-spin 0.6s linear infinite; color: var(--ink); }
  @keyframes ptr-spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="wrapper">

  <div class="topbar">
    <div class="brand">
      <span>dead zero records</span>
    </div>
    <button class="dark-toggle" id="darkToggle" aria-label="Toggle dark mode" title="Toggle dark mode">
      <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
  </div>

  <hr>

  <section>
    <div class="section-label">projects</div>
    <div class="projects">
      <a href="motif.html" class="row">
        <span class="row-icon" aria-hidden="true">
          <img src="motif-icon.svg" alt="">
        </span>
        <div class="row-content">
          <div class="row-name">motif</div>
          <div class="row-meta">melody generator · midi export</div>
        </div>
        <span class="row-arrow" aria-hidden="true">→</span>
      </a>
      <a href="lyric.html" class="row">
        <span class="row-icon" aria-hidden="true">
          <img src="lyric-icon.svg" alt="">
        </span>
        <div class="row-content">
          <div class="row-name">lyric</div>
          <div class="row-meta">phrases · sheet · songwriting</div>
        </div>
        <span class="row-arrow" aria-hidden="true">→</span>
      </a>
      <a href="qr.html" class="row">
        <span class="row-icon" aria-hidden="true">
          <img src="qr-icon.svg" alt="">
        </span>
        <div class="row-content">
          <div class="row-name">QR</div>
          <div class="row-meta">permanent codes · offline</div>
        </div>
        <span class="row-arrow" aria-hidden="true">→</span>
      </a>
      <a href="promo.html" class="row">
        <span class="row-icon" aria-hidden="true">
          <img src="promo-icon.svg" alt="">
        </span>
        <div class="row-content">
          <div class="row-name">promo</div>
          <div class="row-meta">release cards · apple / spotify</div>
        </div>
        <span class="row-arrow" aria-hidden="true">→</span>
      </a>
      <a href="viaje-boda_6.html" class="row">
        <span class="row-icon" aria-hidden="true">💍</span>
        <div class="row-content">
          <div class="row-name">Viaje Boda</div>
          <div class="row-meta">wedding trip</div>
        </div>
        <span class="row-arrow" aria-hidden="true">→</span>
      </a>
    </div>
  </section>

  <footer>guadalajara · ciudad de méxico</footer>
</div>

<script>
  // Dark mode persistence
  const KEY = 'dzr-workshop-dark';
  const darkToggle = document.getElementById('darkToggle');

  function apply(dark) {
    document.body.classList.toggle('dark', dark);
    const meta = document.querySelector('meta[name="theme-color"]');
    if (meta) meta.setAttribute('content', dark ? '#0c0a09' : '#f5f5f4');
  }

  let saved = null;
  try { saved = localStorage.getItem(KEY); } catch(e) {}
  if (saved === '1') apply(true);
  else if (saved === '0') apply(false);
  else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) apply(true);

  darkToggle.addEventListener('click', () => {
    const next = !document.body.classList.contains('dark');
    apply(next);
    try { localStorage.setItem(KEY, next ? '1' : '0'); } catch(e) {}
  });

  // Pull-to-refresh — reload when installed to the Home Screen (a standalone
  // app has no browser refresh button). Pull down from the top and release.
  (function () {
    const THRESHOLD = 70;
    const ptr = document.createElement('div');
    ptr.className = 'ptr';
    ptr.innerHTML = '<svg class="ptr-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12l7 7 7-7"/></svg>';
    document.body.appendChild(ptr);

    const scroller = document.scrollingElement || document.documentElement;
    const EXCLUDE = 'textarea, input, select, [contenteditable="true"]';
    let startY = 0, pulling = false, ready = false;

    function reset() {
      ptr.classList.add('animate');
      ptr.classList.remove('ready');
      ptr.style.opacity = '';
      ptr.style.transform = '';
      ready = false;
      setTimeout(() => ptr.classList.remove('animate'), 260);
    }

    document.addEventListener('touchstart', (e) => {
      if (e.touches.length !== 1) return;
      if ((scroller.scrollTop || window.scrollY || 0) > 0) return;     // only from the very top
      if (e.target.closest && e.target.closest(EXCLUDE)) return;
      startY = e.touches[0].clientY;
      pulling = true;
      ptr.classList.remove('animate');
    }, { passive: true });

    document.addEventListener('touchmove', (e) => {
      if (!pulling) return;
      const dy = e.touches[0].clientY - startY;
      if (dy <= 0) { pulling = false; reset(); return; }              // moving up → let it scroll
      e.preventDefault();                                              // suppress native bounce
      ptr.style.opacity = String(Math.min(1, dy / 45));
      ptr.style.transform = 'translateY(' + (-60 + Math.min(74, dy * 0.6)) + 'px)';
      ready = dy >= THRESHOLD;
      ptr.classList.toggle('ready', ready);
    }, { passive: false });

    function end() {
      if (!pulling) return;
      pulling = false;
      if (ready) {
        ptr.classList.add('animate', 'spin');
        setTimeout(() => location.reload(), 150);
      } else {
        reset();
      }
    }
    document.addEventListener('touchend', end, { passive: true });
    document.addEventListener('touchcancel', end, { passive: true });
  })();
</script>
</body>
</html>
