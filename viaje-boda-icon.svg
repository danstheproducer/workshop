<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0E7C7B"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- dashed travel route arc, España → Grecia → Türkiye -->
  <path d="M104 372 Q210 168 408 156" fill="none" stroke="#f0f9ff" stroke-width="10"
        stroke-linecap="round" stroke-dasharray="4 26" opacity="0.9"/>

  <!-- route pins -->
  <g stroke="#0E7C7B" stroke-width="8">
    <circle cx="104" cy="372" r="24" fill="#fde047"/>
    <circle cx="250" cy="212" r="20" fill="#f0f9ff"/>
    <circle cx="408" cy="156" r="24" fill="#fb7185"/>
  </g>

  <!-- little plane on the way -->
  <g fill="#f0f9ff" transform="translate(324 176) rotate(-32)">
    <path d="M0 -34 L10 -6 L40 6 L10 12 L6 34 L-2 12 L-10 12 L-8 34 L-14 12 L-40 6 L-10 -6 Z"/>
  </g>
</svg>
