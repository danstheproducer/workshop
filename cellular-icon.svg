<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <circle cx="256" cy="250" r="190" fill="#ffffff" opacity="0.07"/>

  <!-- rule-90 / sierpinski cells -->
  <g fill="#f0f9ff">
    <!-- r0 -->
    <rect x="241" y="118" width="30" height="30" rx="7"/>
    <!-- r1 -->
    <rect x="201" y="164" width="30" height="30" rx="7"/>
    <rect x="281" y="164" width="30" height="30" rx="7"/>
    <!-- r2 -->
    <rect x="161" y="210" width="30" height="30" rx="7"/>
    <rect x="321" y="210" width="30" height="30" rx="7"/>
    <!-- r3 -->
    <rect x="121" y="256" width="30" height="30" rx="7"/>
    <rect x="201" y="256" width="30" height="30" rx="7"/>
    <rect x="281" y="256" width="30" height="30" rx="7"/>
    <rect x="361" y="256" width="30" height="30" rx="7"/>
    <!-- r4 -->
    <rect x="81"  y="302" width="30" height="30" rx="7"/>
    <rect x="401" y="302" width="30" height="30" rx="7"/>
    <!-- r5 -->
    <rect x="41"  y="348" width="30" height="30" rx="7"/>
    <rect x="121" y="348" width="30" height="30" rx="7"/>
    <rect x="361" y="348" width="30" height="30" rx="7"/>
    <rect x="441" y="348" width="30" height="30" rx="7"/>
  </g>

  <!-- playhead row + one lit accent cell -->
  <rect x="36" y="398" width="440" height="6" rx="3" fill="#f0f9ff" opacity="0.55"/>
  <rect x="241" y="348" width="30" height="30" rx="7" fill="#fde047"/>
</svg>
