// — Touch interactions —
// Tap pill = new phrase. Swipe right = back. Swipe left = forward. Swipe up = add to sheet.
function attachSwipe(el, handlers, tapHandler) {
  let startX = 0, startY = 0, startT = 0;
  let moved = false;
  let swiped = false;
  let horizontal = false;
  const MOVE_THRESHOLD = 8;     // px of finger movement to count as moving
  const SWIPE_THRESHOLD = 42;   // px of total displacement to register a swipe
  const TIME_LIMIT = 800;       // ms max for a swipe
  const DRAG_DAMP = 0.55;        // how much of the finger movement the pill follows

  function setDrag(dx) {
    el.style.transition = 'none';
    el.style.transform = `translateX(${dx * DRAG_DAMP}px)`;
  }
  function snapBack() {
    el.style.transition = 'transform 0.22s cubic-bezier(0.2, 0.7, 0.2, 1)';
    el.style.transform = '';
  }

  el.addEventListener('touchstart', (e) => {
    if (e.touches.length !== 1) return;
    // Don't engage swipe if touch began on the + button (it's the drag-to-place gesture)
    if (e.target.closest('#addBtn')) return;
    const t = e.touches[0];
    startX = t.clientX;
    startY = t.clientY;
    startT = Date.now();
    moved = false;
    swiped = false;
    horizontal = false;
  }, { passive: true });

  el.addEventListener('touchmove', (e) => {
    if (e.touches.length !== 1) return;
    const t = e.touches[0];
    const dx = t.clientX - startX;
    const dy = t.clientY - startY;
    const absX = Math.abs(dx);
    const absY = Math.abs(dy);
    if (absX > MOVE_THRESHOLD || absY > MOVE_THRESHOLD) moved = true;
    if (!moved) return;

    if (!horizontal && absY > absX && dy < -MOVE_THRESHOLD) {
      // Up swipe (for add)
      el.classList.add('swipe-up');
      el.style.transform = '';
    } else {
      // Horizontal drag — phrase follows the finger
      horizontal = true;
      el.classList.remove('swipe-up');
      setDrag(dx);
    }
  }, { passive: true });

  el.addEventListener('touchend', (e) => {
    el.classList.remove('swipe-up');
    const t = e.changedTouches[0];
    const dx = t.clientX - startX;
    const dy = t.clientY - startY;
    const dt = Date.now() - startT;
    const absX = Math.abs(dx);
    const absY = Math.abs(dy);

    if (!moved || dt > TIME_LIMIT) {
      snapBack();
      return;
    }

    if (absX > absY && absX > SWIPE_THRESHOLD) {
      swiped = true;
      e.preventDefault();
      snapBack();
      if (dx > 0) handlers.right && handlers.right();
      else handlers.left && handlers.left();
      haptic(8);
    } else if (absY > absX && absY > SWIPE_THRESHOLD) {
      snapBack();
      if (dy < 0 && handlers.up) {
        swiped = true;
        e.preventDefault();
        handlers.up();
        haptic(15);
      }
    } else {
      snapBack();
    }
  });

  el.addEventListener('touchcancel', () => {
    el.classList.remove('swipe-up');
    snapBack();
  });

  // Click only fires if it wasn't a swipe.
  el.addEventListener('click', (e) => {
    if (swiped) {
      e.stopImmediatePropagation();
      e.preventDefault();
      swiped = false;
      return;
    }
    if (e.target.closest('#addBtn')) return;
    tapHandler && tapHandler(e);
  });

  // Wheel / trackpad for desktop — one notch per scroll, rate-limited
  let wheelLock = false;
  el.addEventListener('wheel', (e) => {
    e.preventDefault();
    if (wheelLock) return;
    const horiz = Math.abs(e.deltaX) > Math.abs(e.deltaY);
    const delta = horiz ? e.deltaX : e.deltaY;
    if (Math.abs(delta) < 6) return;
    wheelLock = true;
    setTimeout(() => { wheelLock = false; }, 220);
    if (delta > 0) handlers.left && handlers.left();   // scroll down/right → forward
    else handlers.right && handlers.right();           // scroll up/left → back
  }, { passive: false });
}

// Keyboard handling: fit the app to the visible viewport via --app-h so the
// virtual keyboard shrinks the layout (footer sits just above the keyboard)
// instead of lifting the whole document up. Because the body is also capped at
// --app-h, there's nothing taller than the visible area for iOS to scroll —
// so the app can't get "stuck lifted." We only listen to resize (keyboard
// open/close), NOT scroll, so the user's own scrolling/the textarea's internal
// scroll stays free and smooth while the keyboard is open.
(function () {
  const vv = window.visualViewport;
  if (!vv) return; // older browsers fall back to the 100dvh default
  const root = document.documentElement;
  function fit() {
    root.style.setProperty('--app-h', vv.height + 'px');
  }
  vv.addEventListener('resize', fit);
  fit();
})();

  if (document.activeElement === archiveSearch) return;
  if (document.activeElement === searchInput) return;

  if (archive.classList.contains('open')) return;
  if (searchPanel.classList.contains('open')) return;
  if (document.getElementById('settings').classList.contains('open')) return;

  if (e.code === 'Space') {
    e.preventDefault();
    rollNew();
  } else if (e.key === 'Enter') {
    e.preventDefault();
    addCurrent();
  } else if (e.key === 'ArrowLeft') {
    e.preventDefault();
    goBack();
  } else if (e.key === 'ArrowRight') {
    e.preventDefault();
    goForward();
  }
});

// — Pull-to-refresh —
// In standalone PWA mode, the browser's pull-to-refresh is gone, so we
// implement our own. Pulling down from anywhere outside the editable pad
// reveals an indicator; releasing past the threshold reloads the page.
(function setupPullToRefresh() {
  const indicator = document.getElementById('pullRefresh');
  if (!indicator) return;
  const icon = indicator.querySelector('.pull-refresh-icon');

  const THRESHOLD = 70;     // px of effective pull required to trigger
  const MAX_PULL = 140;     // visual cap
  const MIN_START = 6;      // ignore tiny jitters so horizontal swipes don't trigger
  const RESISTANCE = 2.2;   // higher = stiffer pull

  let startY = null;
  let startX = null;
  let pulled = 0;
  let isPulling = false;
  let cancelled = false;

  function panelOpen() {
    return document.body.classList.contains('archive-open')
        || document.body.classList.contains('search-open')
        || document.body.classList.contains('settings-open');
  }

  function setVisual(delta) {
    const d = Math.min(delta, MAX_PULL);
    const progress = d / THRESHOLD;
    const yPct = -160 + Math.min(progress * 170, 200);
    const opacity = Math.min(d / 28, 1);
    indicator.style.transform = `translateX(-50%) translateY(${yPct}%)`;
    indicator.style.opacity = opacity;
    if (icon) icon.style.transform = `rotate(${Math.min(d * 2.4, 360)}deg)`;
    indicator.classList.toggle('ready', d >= THRESHOLD);
  }

  function reset() {
    indicator.classList.remove('pulling', 'ready');
    indicator.style.transform = '';
    indicator.style.opacity = '';
    if (icon) icon.style.transform = '';
  }

  function trigger() {
    indicator.classList.remove('pulling', 'ready');
    indicator.classList.add('refreshing');
    indicator.style.transform = 'translateX(-50%) translateY(20%)';
    indicator.style.opacity = '1';
    if (icon) icon.style.transform = '';
    setTimeout(() => location.reload(), 280);
  }

  document.addEventListener('touchstart', (e) => {
    if (e.touches.length !== 1) return;
    if (panelOpen()) return;
    // Don't start a pull from inside the editable pad — it's used for typing
    if (e.target.closest && e.target.closest('.pad')) return;
    startY = e.touches[0].clientY;
    startX = e.touches[0].clientX;
    pulled = 0;
    isPulling = false;
    cancelled = false;
  }, { passive: true });

  document.addEventListener('touchmove', (e) => {
    if (startY === null || cancelled) return;
    const t = e.touches[0];
    const dy = t.clientY - startY;
    const dx = t.clientX - startX;
    // If the gesture is clearly horizontal, hand it off (let phrase-pill swipes win)
    if (!isPulling && Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > MIN_START) {
      cancelled = true;
      reset();
      return;
    }
    if (dy <= MIN_START) {
      if (isPulling) { reset(); isPulling = false; }
      return;
    }
    pulled = (dy - MIN_START) / RESISTANCE;
    if (!isPulling) {
      isPulling = true;
      indicator.classList.add('pulling');
    }
    setVisual(pulled);
  }, { passive: true });

  function endPull() {
    if (startY === null) return;
    if (!cancelled && pulled >= THRESHOLD) {
      trigger();
    } else {
      reset();
    }
    startY = null;
    startX = null;
    pulled = 0;
    isPulling = false;
    cancelled = false;
  }

  document.addEventListener('touchend', endPull, { passive: true });
  document.addEventListener('touchcancel', endPull, { passive: true });
})();
