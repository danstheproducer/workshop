<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10b981"/>
      <stop offset="1" stop-color="#0d7d6b"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <circle cx="256" cy="250" r="180" fill="#ffffff" opacity="0.08"/>

  <g transform="rotate(-9 256 256)">
    <!-- megaphone body -->
    <path d="M112 240 L300 192 L300 324 L112 286 Z" fill="#fffaf0" stroke="#fffaf0" stroke-width="2" stroke-linejoin="round"/>
    <!-- back mouthpiece -->
    <rect x="86" y="246" width="34" height="34" rx="9" fill="#fffaf0"/>
    <!-- open mouth (rounded rim) -->
    <ellipse cx="300" cy="258" rx="18" ry="66" fill="#fffaf0"/>
    <ellipse cx="300" cy="258" rx="11" ry="52" fill="#0a6f5e" opacity="0.45"/>
    <!-- handle -->
    <rect x="168" y="300" width="30" height="78" rx="13" fill="#fffaf0" transform="rotate(9 183 339)"/>
    <!-- sound waves -->
    <path d="M334 214 Q364 258 334 302" fill="none" stroke="#fde68a" stroke-width="14" stroke-linecap="round"/>
    <path d="M362 192 Q404 258 362 324" fill="none" stroke="#fde68a" stroke-width="14" stroke-linecap="round" opacity="0.85"/>
  </g>
</svg>
