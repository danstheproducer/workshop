<style>

  /* ---------- elegant wedding redesign ---------- */

function arcPts(a,b,bend){
  const clat=(a[0]+b[0])/2 + (b[1]-a[1])*bend, clng=(a[1]+b[1])/2 - (b[0]-a[0])*bend, p=[];
  for(let t=0;t<=1.0001;t+=0.05){ const u=1-t; p.push([u*u*a[0]+2*u*t*clat+t*t*b[0], u*u*a[1]+2*u*t*clng+t*t*b[1]]); }
  return p;
}

function ensureMap(){
  const el=document.getElementById('map'); if(!el || map) return;
  const dark=lsGet('vb_theme','light')==='dark';
  map=L.map('map',{ scrollWheelZoom:false, attributionControl:false });
  L.tileLayer(dark?'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png':'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:18}).addTo(map);
  const MODE={ flight:{c:'#F59E0B',i:'✈️',dash:null,bend:0.16}, train:{c:'#34D399',i:'🚆',dash:'7,6',bend:0.05}, boat:{c:'#22D3EE',i:'⛵',dash:'2,7',bend:0.14} };
  const MX=[19.4326,-99.1332];
  const route=['madrid','galicia','atenas','milos','mar','estambul'].map(id=>CITIES.find(c=>c.id===id));
  const legs=[ {mode:'train',dur:'~4h'}, {mode:'flight',dur:'~6h vía MAD'}, {mode:'flight',dur:'40m'}, {mode:'boat',dur:'3 noches'}, {mode:'flight',dur:'~5h'} ];
  L.polyline(arcPts(MX,route[0].coords,0.18),{color:'#F59E0B',weight:1.4,opacity:.35,dashArray:'3,9'}).addTo(map);
  L.polyline(arcPts(route[route.length-1].coords,MX,0.20),{color:'#F59E0B',weight:1.4,opacity:.35,dashArray:'3,9'}).addTo(map);
  L.circleMarker(MX,{radius:7,color:'#fff',weight:2,fillColor:'#EF4444',fillOpacity:1}).addTo(map).bindTooltip('México · inicio y fin',{className:'city-tooltip',direction:'top'});
  for(let i=0;i<route.length-1;i++){
    const m=MODE[legs[i].mode], pts=arcPts(route[i].coords,route[i+1].coords,m.bend);
    L.polyline(pts,{color:m.c,weight:2.2,opacity:.9,dashArray:m.dash}).addTo(map);
    const mid=pts[Math.floor(pts.length/2)];
    L.marker(mid,{icon:L.divIcon({className:'seg-label',html:'<span class="seglab" style="background:'+m.c+'">'+m.i+' '+legs[i].dur+'</span>',iconSize:[0,0]})}).addTo(map);
  }
  euroBounds=[]; mapNodes=[];
  route.forEach((c,i)=>{
    euroBounds.push(c.coords); mapNodes.push({id:c.id,coords:c.coords});
    const nm=({madrid:'Madrid',galicia:'Vigo',atenas:'Atenas',milos:'Mílos',mar:'Velero',estambul:'Estambul'})[c.id]||c.city.replace('✈️ ','').split(' · ')[0];
    const dir=({madrid:'right',galicia:'left',atenas:'bottom',milos:'top',mar:'bottom',estambul:'top'})[c.id]||'left';
    const off=dir==='right'?[10,0]:dir==='left'?[-10,0]:dir==='top'?[0,-8]:[0,8];
    const mk=L.circleMarker(c.coords,{radius:6,color:'#fff',weight:2,fillColor:c.color,fillOpacity:1}).addTo(map);
    mk.bindTooltip(nm,{className:'city-tooltip',permanent:true,direction:dir,offset:off});
    mk.on('click',function(){ const fd=AGENDA.find(a=>a.cityId===c.id); if(fd) setDay(fd.day); });
  });
  map.fitBounds(euroBounds,{padding:[38,38]});
}
function cityZoom(id){ return ({madrid:7.5, galicia:8, atenas:8, milos:10, mar:9.5, estambul:8})[id] || 6.5; }
function focusMap(){
  if(!map) return;
  if(mapFullView){ map.fitBounds(euroBounds,{padding:[38,38]}); return; }
  const d=AGENDA.find(x=>x.day===DAY)||AGENDA[0];
  const node=mapNodes.find(n=>n.id===d.cityId);
  if(node){ map.flyTo(node.coords, cityZoom(d.cityId), {duration:0.7}); }
  else { map.fitBounds(euroBounds,{padding:[38,38]}); }
}

  if(quizState.i>=qs.length){ host.innerHTML='<div style="margin-top:14px;text-align:center"><div style="font-size:30px">🎉</div><p class="note" style="font-size:14px;color:var(--tx1);font-weight:700">'+quizState.score+'/'+qs.length+'</p><button class="gbtn" onclick="startQuiz(\''+quizState.key+'\')">↻ Repetir</button></div>'; return; }
  const q=qs[quizState.i];
  host.innerHTML='<div style="margin-top:14px"><p class="note" style="font-size:13px;color:var(--tx1);font-weight:700;margin-bottom:10px">'+esc(q.q)+'</p>'+q.opts.map((o,i)=>'<button class="qopt" onclick="answerQ('+i+')">'+esc(o)+'</button>').join('')+'<div id="qfeed"></div></div>';
}
function answerQ(i){
  const q=QUIZ[quizState.key][quizState.i], ok=i===q.a; if(ok) quizState.score++;
  document.getElementById('qfeed').innerHTML='<div class="note" style="padding:10px;border-radius:10px;background:'+(ok?'rgba(16,185,129,.15)':'rgba(239,68,68,.15)')+';color:'+(ok?'#10b981':'#ef4444')+';font-weight:700">'+(ok?'✅ ¡Correcto!':'❌ No era')+'</div><p class="note" style="margin-top:6px">'+esc(q.fact)+'</p><button class="gbtn" onclick="quizState.i++;showQuestion()">Siguiente →</button>';
}

function render(){
  renderTabs(); renderDaybar(); renderMapPanel();
  let h='';
  if(TAB==='itin') h=renderItin();
  else if(TAB==='resv') h=renderResv();
  else if(TAB==='budget') h=renderBudget();
  else if(TAB==='pack') h=renderPack();
  else if(TAB==='words') h=renderWords();
  else if(TAB==='fun') h=renderFun();
  document.getElementById('content').innerHTML=h;
  window.scrollTo(0,0);
}

setTheme(lsGet('vb_theme','light'));
render();
</script>
</body>
</html>
