  /* ---------- elegant wedding redesign ---------- */

  { id:'mar', city:'Velero · Cícladas del Oeste', region:'Mar Egeo', emoji:'⛵', color:ACC.mar, coords:[36.75,24.55],

function renderOverview(){
  const seen=[], legs=[];
  AGENDA.forEach(function(a){ if(seen.indexOf(a.cityId)<0){ seen.push(a.cityId); legs.push(a); } });
  function fmtRange(a,b){
    const p=a.split(' '), q=b.split(' ');
    if(a===b) return p[1]+' '+p[2];
    if(p[2]===q[2]) return p[1]+'–'+q[1]+' '+p[2];
    return p[1]+' '+p[2]+' – '+q[1]+' '+q[2];
  }
  let h='<div class="wrap">';
  h += '<div class="ov-head"><div class="ov-title">El Viaje Completo</div><div class="ov-sub">27 Ago – 11 Sep 2026 · '+AGENDA.length+' días · 6 viajeros</div></div>';
  h += '<div class="ovl">';

    const inCity=AGENDA.filter(function(x){ return x.cityId===a.cityId; });
    const first=inCity[0], last=inCity[inCity.length-1];
    const range=fmtRange(first.date,last.date);
    const place=a.city.replace('✈️ ','').split(' · ')[0];

    if(t) h += '<div class="ovl-move"><span class="ovl-mi">'+t.ic+'</span>'+esc(t.mode)+' · '+esc(t.dur)+'</div>';

      + '<span class="ovl-em">'+a.emoji+'</span>'
      + '<span class="ovl-name">'+esc(place)+'</span>'

  });
  h += '</div></div>';

function arcPts(a,b,bend){
  const clat=(a[0]+b[0])/2 + (b[1]-a[1])*bend, clng=(a[1]+b[1])/2 - (b[0]-a[0])*bend, p=[];
  for(let t=0;t<=1.0001;t+=0.05){ const u=1-t; p.push([u*u*a[0]+2*u*t*clat+t*t*b[0], u*u*a[1]+2*u*t*clng+t*t*b[1]]); }
  return p;
}

function ensureMap(){

  ];
  LEGINFO=[];
  const OCEAN=[
    {name:'México → Madrid', pts:arcPts(MX,route[0].coords,0.18), at:0.82, dur:'10h35m', detail:['✈️ CDMX (MEX) → Madrid (MAD)','Vuelo directo ~10h35m (Iberia / Aeroméxico)','Sale de noche, aterriza al día siguiente por la tarde']},

  ];

  for(let i=0;i<route.length-1;i++){

  }
  euroBounds=[]; mapNodes=[];
  route.forEach((c,i)=>{

    const nm=({madrid:'Madrid',galicia:'Vigo',atenas:'Atenas',milos:'Mílos',mar:'Velero',estambul:'Estambul'})[c.id]||c.city.replace('✈️ ','').split(' · ')[0];

function ageStart(e){
  if(gamePhase!=='ready') return;
  try{ e.target.setPointerCapture(e.pointerId); }catch(_){}
  gamePhase='aging'; gStart=Date.now(); ripenAt=1000+Math.random()*4800;
  const item=document.getElementById('gameItem'), msg=document.getElementById('gameMsg');
  if(msg){ msg.textContent='Añejando…'; msg.style.color='var(--tx3)'; }
  if(item){ item.style.transition='transform '+ripenAt+'ms linear'; item.style.transform='scale(1.5)'; }
  gRAF=requestAnimationFrame(gLoop);
}
function setBar(w,hue){ const b=document.getElementById('gameBar'); if(b){ b.style.transition='none'; b.style.width=w+'%'; b.style.background='hsl('+Math.max(0,Math.round(hue))+',72%,46%)'; } }
function gLoop(){
  const bar=document.getElementById('gameBar'); if(!bar){ gRAF=null; return; }
  const pos100=gameItem.pos*100;
  const t=Date.now()-gStart, perfEnd=ripenAt+gameItem.ms, rotEnd=perfEnd+650, moldEnd=rotEnd+500;
  if(t<ripenAt){ const f=t/ripenAt; let d; if(f<0.5) d=(f/0.5)/3; else if(f<0.8) d=1/3+((f-0.5)/0.3)/3; else d=2/3+((f-0.8)/0.2)/3; setBar(d*pos100, 120-60*d); }  // añejando en 3 velocidades (acelera por tercios)
  else if(t<perfEnd){                                                                 // EN SU PUNTO (en la marca, verde)
    if(gamePhase==='aging'){ gamePhase='signal'; gameCueTime=Date.now(); const m=document.getElementById('gameMsg'); if(m){ m.textContent='¡EN SU PUNTO! ¡SUELTA!'; m.style.color='#0a9d5a'; } const st=document.getElementById('gameStage'); if(st){ st.style.background='rgba(16,185,129,.18)'; st.style.animation='cuePulse .45s ease-out'; } }
    const p=(t-ripenAt)/gameItem.ms; setBar(pos100+p*3, 120-40*p);
  }
  else if(t<rotEnd){                                                                  // se pasa: verde→rojo
    if(gamePhase==='signal'){ gamePhase='rot'; const m=document.getElementById('gameMsg'); if(m){ m.textContent='se está pasando…'; m.style.color='#b45309'; } const st=document.getElementById('gameStage'); if(st){ st.style.background='rgba(239,68,68,.12)'; st.style.animation=''; } }
    const p=(t-perfEnd)/650; setBar(pos100+3+p*(97-pos100), 60-60*p);
  }
  else if(t<moldEnd){ const p=(t-rotEnd)/500; setBar(100, p*110); }                   // podrido: rojo→moho verde
  else { gRAF=null; finishGame('podrido',0); return; }
  gRAF=requestAnimationFrame(gLoop);
}
function ageEnd(){
  if(gamePhase==='aging'){ if(gRAF) cancelAnimationFrame(gRAF); gRAF=null; finishGame('crudo',0); }
  else if(gamePhase==='signal'){ if(gRAF) cancelAnimationFrame(gRAF); gRAF=null; finishGame('punto', Date.now()-gameCueTime); }
  else if(gamePhase==='rot'){ if(gRAF) cancelAnimationFrame(gRAF); gRAF=null; finishGame('podrido',0); }
}
function finishGame(kind, rt){
  if(gamePhase==='result') return;
  gamePhase='result'; if(gRAF) cancelAnimationFrame(gRAF); gRAF=null;
  const g=gameItem;
  let big, color, sub, face, extra='';
  if(kind==='crudo'){ big='CRUDO!'; color='#EF4444'; sub=g.crudo; face='🫙'; }
  else if(kind==='podrido'){ big='PODRIDO!'; color='#7c3f00'; sub=g.podrido; face='🤢'; }
  else { const stars=rt<130?'⭐⭐⭐':rt<280?'⭐⭐':'⭐'; big=g.punto; color='#10b981'; sub='Reacción: '+rt+' ms · '+stars; face=g.emoji;
    const isWine=WINES.indexOf(gameItem)>=0, listKey=isWine?'vb_winewon':'vb_cheesewon', insKey=isWine?'wine':'cheese';
    const won=lsGet(listKey,[]), first=won.indexOf(g.name)<0; if(first){ won.push(g.name); lsSet(listKey,won); }
    const total=isWine?WINES.length:CHEESES.length, have=won.length, done=isWine?wineDone():cheeseDone();
    if(done && first){ extra='<p class="gwin">🏅 ¡INSIGNIA! '+INSIGNIA[insKey].em+' '+esc(INSIGNIA[insKey].title)+'</p><p class="note" style="margin-top:6px;font-weight:800;color:#c47f17">'+(isWine?'🍷 ¡Modo VINO desbloqueado!':'🧀 ¡Modo QUESO desbloqueado!')+' (botón de tema)</p>'; if(document.getElementById('themeBtn')) setTheme(lsGet('vb_theme','light')); }
    else if(done){ extra='<p class="note" style="margin-top:8px;font-weight:700;color:var(--tx1)">'+INSIGNIA[insKey].em+' insignia completa · los 3 '+(isWine?'vinos':'quesos')+' distintos</p>'; }
    else { extra='<p class="note" style="margin-top:8px;font-weight:700;color:var(--tx1)">'+INSIGNIA[insKey].em+' progreso: '+have+'/'+total+' '+(isWine?'vinos':'quesos')+' distintos</p>'; }
    extra += proNote(); renderBadges(); renderStatus();
  }
  gameCat = gameCat==='wine'?'cheese':'wine';
  fillModal('<div class="seclbl">Juego · '+esc(g.name)+'</div><div style="text-align:center;padding:10px 0"><div class="popin" style="font-size:48px">'+face+'</div>'
    +'<p class="gtitle" style="color:'+color+'">'+big+'</p>'
    +'<p class="greact">'+esc(sub)+'</p>'+extra+'</div>'
    +'<p class="note" style="font-size:12px;color:var(--tx-dim);margin-top:6px;line-height:1.6">'+esc(g.fact)+'</p>'
    +'<button class="gbtn" onclick="openGame()">↻ Otra cosecha · '+(gameCat==='wine'?'Vino':'Queso')+'</button>');
}
function isPro(){ return wineDone() && cheeseDone(); }
function isMax(){ const q=lsGet('vb_quizwins',[]); return ALLQUIZ.every(function(k){return q.indexOf(k)>=0;}); }
function proNote(){ if(isPro() && !lsGet('vb_pro_ann',false)){ lsSet('vb_pro_ann',true); return '<p class="note" style="margin-top:8px;font-weight:800;color:var(--accent)">🏆 ¡Venciste los 6 vinos y quesos! Eres PRO.</p>'; } return ''; }
function maxNote(){ if(isMax() && !lsGet('vb_max_ann',false)){ lsSet('vb_max_ann',true); return '<p class="note" style="margin-top:8px;font-weight:800;color:var(--accent)">🧠 ¡Dominaste toda la trivia! Eres MAX.</p>'; } return ''; }
function renderStatus(){ const el=document.getElementById('status'); if(!el) return; const both=isMax()&&isPro(); let h=''; if(isMax()) h+='<span class="stchip max'+(both?' clk':'')+'"'+(both?' onclick="openWordSoup()"':'')+'>MAX</span>'; if(isPro()) h+='<span class="stchip pro'+(both?' clk':'')+'"'+(both?' onclick="openWordSoup()"':'')+'>PRO</span>'; el.innerHTML=h; }
function statusClick(){ if(isMax()&&isPro()) openWordSoup(); else if(isMax()) toast('🧠 Eres MAX. Vence los 6 vinos y quesos (juego del anillo) para desbloquear MAX PRO.'); else toast('🏆 Eres PRO. Perfecciona toda la trivia (emoji de cada lugar) para desbloquear MAX PRO.'); }
function toast(msg){ fillModal('<div class="seclbl">Estado</div><p class="note" style="font-size:14px;line-height:1.7;color:var(--tx2);margin-top:10px">'+esc(msg)+'</p><button class="gbtn" onclick="closeModal()">Ok</button>'); document.getElementById('modal').classList.add('on'); }
const SOUPPOOL=['CALIFA','FARAON','NILO','SUFI','RUMI','EGEO','MECA','SULTAN','HAREM','VISIR','SAHARA','DERVIS','HAFIZ','MEDINA','SFINGE'];
let SOUPWORDS=[], soupGrid=[], soupFound=[], soupFoundCells=new Set(), soupSel=null, soupTimer=null, soupLeft=30;
function pick3(){ const p=SOUPPOOL.filter(function(w){return w.length<=10;}); const out=[]; while(out.length<3 && p.length){ out.push(p.splice(Math.floor(Math.random()*p.length),1)[0]); } return out; }
function openWordSoup(){
  clearInterval(soupTimer);
  SOUPWORDS=pick3();
  soupFound=[]; soupFoundCells=new Set(); soupSel=null; soupLeft=30;
  soupGrid=Array.from({length:10},function(){return Array(10).fill('');});
  SOUPWORDS.forEach(function(w){ placeWord(w); });
  const A='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  for(let r=0;r<10;r++)for(let c=0;c<10;c++){ if(!soupGrid[r][c]) soupGrid[r][c]=A[Math.floor(Math.random()*26)]; }
  renderSoup(); document.getElementById('modal').classList.add('on');
  soupTimer=setInterval(function(){ soupLeft--; const t=document.getElementById('soupTime'); if(t){ t.textContent=soupLeft+'s'; if(soupLeft<=10) t.style.color='#EF4444'; } if(soupLeft<=0){ clearInterval(soupTimer); soupLose(); } }, 1000);
}
function soupLose(){ clearInterval(soupTimer); fillModal('<div class="seclbl">⏳ Se acabó el tiempo</div><div style="text-align:center;padding:10px 0"><div class="popin" style="font-size:44px">🐫💨</div><p class="gtitle" style="color:#EF4444">¡MUY LENTO!</p><p class="note" style="color:var(--tx2)">Encontraste '+soupFound.length+'/3. El desierto es paciente… vuelve a intentarlo.</p></div><button class="gbtn" onclick="openWordSoup()">↻ Otra sopa (palabras nuevas)</button>'); document.getElementById('modal').classList.add('on'); }
function placeWord(w){
  for(let tr=0;tr<300;tr++){
    const h=Math.random()<0.5;
    const r=Math.floor(Math.random()*(h?10:11-w.length));
    const c=Math.floor(Math.random()*(h?11-w.length:10));
    let ok=true; for(let i=0;i<w.length;i++){ const rr=h?r:r+i, cc=h?c+i:c; const cur=soupGrid[rr][cc]; if(cur && cur!==w[i]){ ok=false; break; } }
    if(ok){ for(let i=0;i<w.length;i++){ const rr=h?r:r+i, cc=h?c+i:c; soupGrid[rr][cc]=w[i]; } return; }
  }
}
function cellsOf(r0,c0,r1,c1){ const out=[]; if(r0===r1){ const s=c1>=c0?1:-1; for(let c=c0;;c+=s){ out.push(r0+'-'+c); if(c===c1) break; } } else { const s=r1>=r0?1:-1; for(let r=r0;;r+=s){ out.push(r+'-'+c0); if(r===r1) break; } } return out; }
function lineWord(r0,c0,r1,c1){
  if(r0===r1){ const s=c1>=c0?1:-1; let out=''; for(let c=c0;;c+=s){ out+=soupGrid[r0][c]; if(c===c1) break; } return {word:out, cells:cellsOf(r0,c0,r1,c1)}; }
  if(c0===c1){ const s=r1>=r0?1:-1; let out=''; for(let r=r0;;r+=s){ out+=soupGrid[r][c0]; if(r===r1) break; } return {word:out, cells:cellsOf(r0,c0,r1,c1)}; }
  return null;
}
function soupClick(r,c){
  if(!soupSel){ soupSel=[r,c]; renderSoup(); return; }
  const res=lineWord(soupSel[0],soupSel[1],r,c); soupSel=null;
  if(res){ const w=res.word, rw=w.split('').reverse().join(''); const hit=SOUPWORDS.find(function(tw){ return (tw===w||tw===rw) && soupFound.indexOf(tw)<0; }); if(hit){ soupFound.push(hit); res.cells.forEach(function(k){ soupFoundCells.add(k); }); if(soupFound.length===SOUPWORDS.length){ soupVictory(); return; } } }
  renderSoup();
}
function renderSoup(){
  let g='<div class="seclbl">MAX PRO · sopa · <span id="soupTime" style="color:'+(soupLeft<=10?'#EF4444':'var(--accent)')+'">'+soupLeft+'s</span></div><div style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:8px 0">'
    +SOUPWORDS.map(function(w){ const f=soupFound.indexOf(w)>=0; return '<span style="font-family:Archivo;font-size:12px;font-weight:800;padding:3px 9px;border-radius:20px;'+(f?'background:#10b981;color:#fff':'background:rgba(0,0,0,.06);color:var(--tx2)')+'">'+w+'</span>'; }).join('')+'</div>'
    +'<div style="display:grid;grid-template-columns:repeat(10,1fr);gap:2px;max-width:330px;margin:0 auto">';
  for(let r=0;r<10;r++)for(let c=0;c<10;c++){ const key=r+'-'+c, found=soupFoundCells.has(key), sel=soupSel&&soupSel[0]===r&&soupSel[1]===c; g+='<button onclick="soupClick('+r+','+c+')" style="aspect-ratio:1;border:none;border-radius:4px;font-family:Archivo;font-weight:800;font-size:12px;cursor:pointer;background:'+(found?'#10b981':sel?'var(--accent)':'rgba(0,0,0,.05)')+';color:'+(found||sel?'#fff':'var(--tx1)')+'">'+soupGrid[r][c]+'</button>'; }
  g+='</div><p class="note" style="font-size:11px;color:var(--tx-dim);margin-top:10px;text-align:center">Toca la primera y la última letra de cada palabra (horizontal o vertical).</p>';
  fillModal(g);
}
function soupVictory(){
  clearInterval(soupTimer);
  const n=cats()+1; lsSet('vb_cats',n);
  lsSet('vb_winewon',[]); lsSet('vb_cheesewon',[]); lsSet('vb_quizwins',[]); lsSet('vb_pro_ann',false); lsSet('vb_max_ann',false);
  renderBadges(); renderStatus();
  if(n>=3){ lockApp(); return; }
  const p=CATSAY[n][Math.floor(Math.random()*CATSAY[n].length)];
  fillModal('<div class="seclbl">✦ Gato '+n+' de 3 ✦</div><div style="text-align:center;padding:8px 0"><div class="popin" style="font-size:54px">🐱</div><p style="font-family:\'Archivo Black\',sans-serif;font-size:18px;color:var(--accent);margin:10px 0;line-height:1.25">GATO '+n+' DESBLOQUEADO</p><p class="note" style="font-style:italic;color:var(--tx2);line-height:1.75">'+esc(p)+'</p><p class="note" style="margin-top:10px;color:var(--tx-dim);font-size:12px">Vuelve a ganar todas las insignias y la sopa para el próximo gato…</p></div><button class="gbtn" onclick="closeModal()">Seguir</button>');
  document.getElementById('modal').classList.add('on');
}
let pullStart=0, pulling=false, pullArmed=false, wheelUp=0;
function doReload(){ lsSet('vb_mapfull',true); lsSet('vb_mapopen',true); location.reload(); }
function initPull(){
  const ind=document.getElementById('pullInd');
  window.addEventListener('touchstart', function(e){ if(window.scrollY<=0){ pullStart=e.touches[0].clientY; pulling=true; pullArmed=false; } }, {passive:true});
  window.addEventListener('touchmove', function(e){ if(!pulling) return; const dy=e.touches[0].clientY-pullStart; if(window.scrollY<=0 && dy>0){ const d=Math.min(dy,130); if(ind){ ind.style.height=d+'px'; ind.style.opacity=Math.min(1,d/90); ind.textContent = d>85?'↻ suelta para recargar':'↓ tira para recargar'; } pullArmed=d>85; } else { pullArmed=false; if(ind) ind.style.height='0'; } }, {passive:true});
  window.addEventListener('touchend', function(){ const armed=pullArmed; pulling=false; pullArmed=false; const ind=document.getElementById('pullInd'); if(ind){ ind.style.height='0'; ind.style.opacity='0'; } if(armed) doReload(); }, {passive:true});
  window.addEventListener('wheel', function(e){ if(window.scrollY<=0 && e.deltaY<0){ wheelUp+=(-e.deltaY); if(wheelUp>420){ wheelUp=0; doReload(); } } else { wheelUp=0; } }, {passive:true});
}

function render(){
  renderMenu(); renderDaybar(); renderMapPanel(); renderBadges(); renderStatus();
  let h='';
  if(TAB==='itin') h = (DAY===0) ? renderOverview() : renderItin();
  else if(TAB==='resv') h=renderResv();
  else if(TAB==='budget') h=renderBudget();
  else if(TAB==='pack') h=renderPack();
  else if(TAB==='words') h=renderWords();
  document.getElementById('content').innerHTML=h;
  window.scrollTo(0,0);
}

setTheme(lsGet('vb_theme','light'));
render();
initPull();
</script>
</body>
