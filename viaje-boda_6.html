<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  .tabbar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 620px; display: flex; background: var(--bg-bar); border-top: 1px solid var(--bd); z-index: 1000; padding: 5px 4px calc(5px + env(safe-area-inset-bottom)); }

  .city-tooltip { background: rgba(20,15,24,0.9) !important; color: #fff !important; border: none !important; border-radius: 5px !important; font-family: 'Archivo', sans-serif !important; font-weight: 700 !important; font-size: 9px !important; letter-spacing: .3px !important; padding: 2px 6px !important; box-shadow: 0 1px 4px rgba(0,0,0,.35) !important; }

  /* ---------- elegant wedding redesign ---------- */
  .brand .t1 { font-family:'Archivo Black',sans-serif; letter-spacing:.3px; }

      out.push({ day:n++, date:DIAS[dd.getDay()]+' '+dd.getDate()+' '+MESES[dd.getMonth()],

  });

  h += '<div class="dayhero">'

    + '<span class="dh-cnr tr">'+esc(d.region)+'</span>'
    + '<div class="dh-em">'+d.emoji+'</div>'

    + '<div class="dh-date">'+esc(d.date)+' · '+d.events.length+' paradas</div>'
    + '<div class="plate-rule"></div>'
    + (d.firstOfCity&&d.cityDesc?'<div class="dh-desc">'+esc(d.cityDesc)+'</div>':'')
    + (hotel?'<a class="hotelchip" style="margin-top:12px" href="'+hotel.link+'" target="_blank" rel="noopener"><div><div class="hl">DORMIMOS EN</div><div class="hn">'+esc(hotel.name)+'</div><div class="hs">'+esc(hotel.sub)+'</div>'+(hotel.alt?'<div class="hs" style="margin-top:4px;color:var(--tx-dim);font-size:9.5px">'+esc(hotel.alt)+'</div>':'')+'</div><span style="color:var(--tx-dim);font-size:12px">→</span></a>':'')

    + '</div>';
  d.events.forEach((ev,idx)=>{
    const col=TAG[ev.tag]||'#94a3b8';
    const uid='d'+d.day+'e'+idx;
    const hasMore = ev.desc || (ev.tips&&ev.tips.length);
    h += '<div class="ev-item">'
      + '<div class="plate'+(hasMore?' clickable':'')+'" id="pl-'+uid+'"'+(hasMore?' onclick="togglePlate(\''+uid+'\')"':'')+'>'
      + '<span class="plate-cnr tl">'+esc(ev.time)+'</span>'
      + (ev.dur?'<span class="plate-cnr tr">'+esc(ev.dur)+'</span>':'')

      + '<div class="plate-rule" style="background:'+col+'"></div>'

}

function togglePlate(uid){
  const p=document.getElementById('pl-'+uid), m=document.getElementById('pm-'+uid), b=document.getElementById('pc-'+uid);
  if(!m) return;
  const open=m.classList.toggle('open');
  if(p) p.classList.toggle('open',open);
  if(b) b.textContent = open?'×':'+';
}
function arcPts(a,b,bend){
  const clat=(a[0]+b[0])/2 + (b[1]-a[1])*bend, clng=(a[1]+b[1])/2 - (b[0]-a[0])*bend, p=[];
  for(let t=0;t<=1.0001;t+=0.05){ const u=1-t; p.push([u*u*a[0]+2*u*t*clat+t*t*b[0], u*u*a[1]+2*u*t*clng+t*t*b[1]]); }
  return p;
}
let mapNodes=[], euroBounds=[];
function mapLegendHTML(){
  return [['✈️ Vuelo','#F59E0B'],['🚆 Tren','#34D399'],['⛵ Velero','#22D3EE']]
    .map(m=>'<span class="leg"><span class="legdot" style="background:'+m[1]+'"></span>'+m[0]+'</span>').join('');
}
function ensureMap(){
  const el=document.getElementById('map'); if(!el || map) return;
  const dark=lsGet('vb_theme','light')==='dark';
  map=L.map('map',{ scrollWheelZoom:false, attributionControl:false });
  L.tileLayer(dark?'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png':'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:18}).addTo(map);
  const MODE={ flight:{c:'#F59E0B',i:'✈️',dash:null,bend:0.16}, train:{c:'#34D399',i:'🚆',dash:'7,6',bend:0.05}, boat:{c:'#22D3EE',i:'⛵',dash:'2,7',bend:0.14} };
  const MX=[19.4326,-99.1332];
  const route=['madrid','galicia','milos','mar','estambul'].map(id=>CITIES.find(c=>c.id===id));
  const legs=[ {mode:'train',dur:'~4h'}, {mode:'flight',dur:'~7h'}, {mode:'boat',dur:'3 noches'}, {mode:'flight',dur:'~5h'} ];
  L.polyline(arcPts(MX,route[0].coords,0.18),{color:'#F59E0B',weight:1.4,opacity:.35,dashArray:'3,9'}).addTo(map);
  L.polyline(arcPts(route[route.length-1].coords,MX,0.20),{color:'#F59E0B',weight:1.4,opacity:.35,dashArray:'3,9'}).addTo(map);
  L.circleMarker(MX,{radius:7,color:'#fff',weight:2,fillColor:'#EF4444',fillOpacity:1}).addTo(map).bindTooltip('México · inicio y fin',{className:'city-tooltip',direction:'top'});
  for(let i=0;i<route.length-1;i++){
    const m=MODE[legs[i].mode], pts=arcPts(route[i].coords,route[i+1].coords,m.bend);
    L.polyline(pts,{color:m.c,weight:2.2,opacity:.9,dashArray:m.dash}).addTo(map);
    const mid=pts[Math.floor(pts.length/2)];
    L.marker(mid,{icon:L.divIcon({className:'seg-label',html:'<span class="seglab" style="background:'+m.c+'">'+m.i+' '+legs[i].dur+'</span>',iconSize:[0,0]})}).addTo(map);
  }
  euroBounds=[]; mapNodes=[];
  route.forEach((c,i)=>{
    euroBounds.push(c.coords); mapNodes.push({id:c.id,coords:c.coords});
    const nm=({madrid:'Madrid',galicia:'Vigo',atenas:'Atenas',milos:'Mílos',mar:'Velero',estambul:'Estambul'})[c.id]||c.city.replace('✈️ ','').split(' · ')[0];
    const dir=({madrid:'right',galicia:'left',atenas:'top',milos:'left',mar:'bottom',estambul:'top'})[c.id]||'left';
    const off=dir==='right'?[10,0]:dir==='left'?[-10,0]:dir==='top'?[0,-8]:[0,8];
    const mk=L.circleMarker(c.coords,{radius:6,color:'#fff',weight:2,fillColor:c.color,fillOpacity:1}).addTo(map);
    mk.bindTooltip(nm,{className:'city-tooltip',permanent:true,direction:dir,offset:off});
    mk.on('click',function(){ const fd=AGENDA.find(a=>a.cityId===c.id); if(fd) setDay(fd.day); });
  });
  map.fitBounds(euroBounds,{padding:[38,38]});
}
function cityZoom(id){ return ({madrid:7.5, galicia:8, atenas:8, milos:10, mar:9.5, estambul:8})[id] || 6.5; }
function focusMap(){
  if(!map) return;
  if(mapFullView){ map.fitBounds(euroBounds,{padding:[38,38],animate:false}); return; }
  const d=AGENDA.find(x=>x.day===DAY)||AGENDA[0];
  const node=mapNodes.find(n=>n.id===d.cityId);
  if(node){ map.setView(node.coords, cityZoom(d.cityId), {animate:false}); }
  else { map.fitBounds(euroBounds,{padding:[38,38],animate:false}); }
}
function renderMapPanel(){
  const wrap=document.getElementById('mapwrap'); if(!wrap) return;
  if(TAB!=='itin'){ wrap.style.display='none'; return; }
  wrap.style.display='block';
  document.getElementById('mapChev').textContent = mapOpen?'▾':'▸';
  const fb=document.getElementById('mapFullBtn');
  fb.style.display = mapOpen?'inline-flex':'none';
  fb.innerHTML = mapFullView?'📍 Enfocar día':'🌍 Viaje completo';
  document.getElementById('mapLegend').innerHTML = mapLegendHTML();
  document.getElementById('mapbox').style.display = mapOpen?'block':'none';
  if(mapOpen){ ensureMap(); setTimeout(function(){ if(map){ map.invalidateSize(); focusMap(); } }, 50); }
}
function toggleMap(){ mapOpen=!mapOpen; lsSet('vb_mapopen',mapOpen); renderMapPanel(); }
function toggleMapFull(){ mapFullView=!mapFullView; lsSet('vb_mapfull',mapFullView); renderMapPanel(); }

function renderResv(){
  const done=RESERVATIONS.filter(r=>r.done).length;
  let h='<div class="wrap"><div class="card"><div class="h3">Reservas y pendientes</div>'
    + '<p class="note" style="margin-top:6px">'+done+'/'+RESERVATIONS.length+' listas. 🔴 = urgente · 🟠 = pronto · 🟢 = con calma. Toca el cuadro para marcar.</p></div>';
  const cats=[]; RESERVATIONS.forEach(r=>{ if(cats.indexOf(r.cat)<0) cats.push(r.cat); });
  cats.forEach(cat=>{
    h+='<div class="seclbl">'+esc(cat)+'</div>';
    RESERVATIONS.filter(r=>r.cat===cat).forEach(r=>{
      h+='<div class="resv '+(r.done?'done':'')+'"><div class="chk" onclick="toggleResv(\''+r.id+'\')">'+(r.done?'✓':'')+'</div>'
        + '<div class="em">'+r.em+'</div><div class="b"><div class="nm">'+esc(r.name)+'</div>'
        + '<div class="meta">'+esc(r.city)+' · '+esc(r.date)+' · '+esc(r.deadline)+'</div>'
        + '<div class="meta">'+esc(r.note)+'</div>'
        + (r.link?'<a class="lnk" style="margin-top:6px" href="'+r.link+'" target="_blank" rel="noopener">🔗 Abrir</a>':'')
        + '</div></div>';
    });
  });
  return h+'</div>';
}

function renderBudget(){
  const s=lsGet('vb_budget',{});
  let total=0;
  let h='<div class="wrap"><div class="card"><div class="h3">Presupuesto detallado</div>'
    + '<p class="note" style="margin-top:6px">Para 6 personas · 16 días · en MXN. Precios verificados en jul 2026 (vuelos, tren Madrid-Vigo, ferry/charter). Hotel de Vigo ya CONFIRMADO ($22,596). Tipo de cambio jul 2026: 1 EUR ≈ 20 MXN · 1 USD ≈ 17.5 MXN. Los hoteles son estimados de temporada — toca cualquier cifra para editarla.</p></div>';
  BUDGET.forEach((g,gi)=>{
    let sub=0;
    h+='<div class="seclbl">'+esc(g.cat)+'</div><div class="card">';
    g.items.forEach(it=>{
      const v=(s[it.k]!==undefined)?s[it.k]:it.def;
      sub+=Number(v)||0;
      h+='<div class="brow"><span class="l">'+esc(it.label)+'</span><span class="v">$<input value="'+v+'" inputmode="numeric" data-k="'+it.k+'" onchange="updBudget(this)" style="width:72px;background:none;border:none;border-bottom:1px dashed var(--bd);color:var(--tx1);font-family:Archivo,sans-serif;font-weight:700;font-size:12px;text-align:right"></span></div>';
    });
    total+=sub;
    h+='<div class="bsub"><span>Subtotal</span><span>$'+sub.toLocaleString('es-MX')+'</span></div></div>';
  });
  h+='<div class="btotal"><span>Total del viaje</span><span>$'+total.toLocaleString('es-MX')+' MXN</span></div>'
    + '<p class="note" style="margin-top:10px;text-align:center">≈ $'+Math.round(total/6).toLocaleString('es-MX')+' MXN por persona · ≈ '+Math.round(total/20/6).toLocaleString('es-MX')+' EUR pp</p>'
    + '<p class="note" style="margin-top:6px;text-align:center;font-size:11px;color:var(--tx-dim)">Dónde recortar sin perder magia: hoteles 4★ con carácter (−25%), charter solo con capitán cocinando ustedes (−40,000), menos cenas estrella. Dónde NO recortar: el velero, las Cíes, el hammam Hürrem Sultan.</p></div>';
  return h;
}

function renderPack(){
  const c=lsGet('vb_pack',{});
  let h='<div class="wrap"><div class="card"><div class="h3">Maleta</div>'
    + '<p class="note" style="margin-top:6px">Boda + verano de costa + 3 noches en velero. Regla de oro: bolsa blanda para el barco. Toca para marcar.</p></div>';
  PACKING.forEach(g=>{
    h+='<div class="seclbl">'+esc(g.cat)+'</div><div class="card" style="padding:6px 12px">';
    g.items.forEach(it=>{ const k=g.cat+'|'+it; const on=c[k];
      h+='<div class="resv '+(on?'done':'')+'" style="border:none;background:none;padding:7px 0;margin:0;border-bottom:1px solid var(--divider)"><div class="chk" onclick="togglePack(\''+esc(k).replace(/'/g,"\\'")+'\')">'+(on?'✓':'')+'</div><div class="b"><div class="nm" style="font-weight:500">'+esc(it)+'</div></div></div>'; });
    h+='</div>';
  });
  return h+'</div>';
}

function renderWords(){
  let h='<div class="wrap"><div class="card"><div class="h3">Frases útiles</div>'
    + '<p class="note" style="margin-top:6px">Toca una frase para copiarla.</p></div>';
  PHRASES.forEach(g=>{
    h+='<div class="seclbl">'+esc(g.cat)+'</div>';
    g.items.forEach(p=>{ h+='<div class="ph" onclick="navigator.clipboard&&navigator.clipboard.writeText(\''+esc(p.nat).replace(/'/g,"\\'")+'\')"><div class="nat">'+esc(p.nat)+'</div><div style="flex:1"><div class="py">'+esc(p.py)+'</div><div class="es">'+esc(p.es)+'</div></div></div>'; });
  });
  return h+'</div>';
}

let quizState=null;
function renderFun(){
  return '<div class="wrap"><div class="seclbl">Quiz del viaje</div><div class="card">'
    + '<button class="gbtn" onclick="startQuiz(\'galicia\')">🦪 Galicia</button>'
    + '<button class="gbtn" onclick="startQuiz(\'milos\')">🌋 Mílos</button>'
    + '<button class="gbtn" onclick="startQuiz(\'estambul\')">🕌 Estambul</button>'
    + '<div id="quizHost"></div></div>'
    + '<div class="seclbl">Sabiduría viajera</div><div class="card">'
    + '<p id="wisdom" class="note" style="font-style:italic;font-size:13px;color:var(--tx2)">'+esc(WISDOM[Math.floor(Math.random()*WISDOM.length)])+'</p>'
    + '<button class="gbtn" onclick="document.getElementById(\'wisdom\').textContent=WISDOM[Math.floor(Math.random()*WISDOM.length)]">↻ Otra</button></div></div>';
}
function startQuiz(k){ quizState={key:k,i:0,score:0}; showQuestion(); }
function showQuestion(){
  const host=document.getElementById('quizHost'); if(!host) return;
  const qs=QUIZ[quizState.key];
  if(quizState.i>=qs.length){ host.innerHTML='<div style="margin-top:14px;text-align:center"><div style="font-size:30px">🎉</div><p class="note" style="font-size:14px;color:var(--tx1);font-weight:700">'+quizState.score+'/'+qs.length+'</p><button class="gbtn" onclick="startQuiz(\''+quizState.key+'\')">↻ Repetir</button></div>'; return; }
  const q=qs[quizState.i];
  host.innerHTML='<div style="margin-top:14px"><p class="note" style="font-size:13px;color:var(--tx1);font-weight:700;margin-bottom:10px">'+esc(q.q)+'</p>'+q.opts.map((o,i)=>'<button class="qopt" onclick="answerQ('+i+')">'+esc(o)+'</button>').join('')+'<div id="qfeed"></div></div>';
}
function answerQ(i){
  const q=QUIZ[quizState.key][quizState.i], ok=i===q.a; if(ok) quizState.score++;
  document.getElementById('qfeed').innerHTML='<div class="note" style="padding:10px;border-radius:10px;background:'+(ok?'rgba(16,185,129,.15)':'rgba(239,68,68,.15)')+';color:'+(ok?'#10b981':'#ef4444')+';font-weight:700">'+(ok?'✅ ¡Correcto!':'❌ No era')+'</div><p class="note" style="margin-top:6px">'+esc(q.fact)+'</p><button class="gbtn" onclick="quizState.i++;showQuestion()">Siguiente →</button>';
}

function render(){
  renderTabs(); renderDaybar(); renderMapPanel();
  let h='';
  if(TAB==='itin') h=renderItin();
  else if(TAB==='resv') h=renderResv();
  else if(TAB==='budget') h=renderBudget();
  else if(TAB==='pack') h=renderPack();
  else if(TAB==='words') h=renderWords();
  else if(TAB==='fun') h=renderFun();
  document.getElementById('content').innerHTML=h;
  window.scrollTo(0,0);
}

setTheme(lsGet('vb_theme','light'));
render();
</script>
