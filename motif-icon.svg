<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- faint piano-roll gridlines -->
  <g stroke="#ffffff" stroke-width="2" opacity="0.12">
    <line x1="64" y1="150" x2="448" y2="150"/>
    <line x1="64" y1="210" x2="448" y2="210"/>
    <line x1="64" y1="270" x2="448" y2="270"/>
    <line x1="64" y1="330" x2="448" y2="330"/>
    <line x1="64" y1="390" x2="448" y2="390"/>
  </g>

  <!-- melody contour -->
  <g fill="#f0f9ff">
    <rect x="78"  y="276" width="58" height="42" rx="11"/>
    <rect x="148" y="216" width="58" height="42" rx="11"/>
    <rect x="218" y="156" width="58" height="42" rx="11"/>
    <rect x="288" y="216" width="58" height="42" rx="11"/>
    <rect x="358" y="276" width="58" height="42" rx="11"/>
  </g>

  <!-- counter-melody (longer, lower, amber) -->
  <g fill="#fde047">
    <rect x="78"  y="366" width="128" height="40" rx="11"/>
    <rect x="288" y="366" width="128" height="40" rx="11"/>
  </g>
</svg>
